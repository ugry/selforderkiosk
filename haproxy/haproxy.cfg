global
    log stdout format raw local0
    maxconn 1000

defaults
    mode    http
    log     global
    option  httplog
    timeout connect  5s
    timeout client  60s
    timeout server  60s
    option  httpchk GET /health

frontend api
    bind *:8080
    default_backend backends

backend backends
    balance     roundrobin
    option      httpchk GET /health
    http-check  expect status 200
    server b1 backend-1:8000 check inter 3s fall 2 rise 2
    server b2 backend-2:8000 check inter 3s fall 2 rise 2

frontend stats
    bind *:8404
    stats enable
    stats uri /
    stats refresh 5s
    stats show-node
